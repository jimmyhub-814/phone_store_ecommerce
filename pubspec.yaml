name: phone_store
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_login: ^5.0.0
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  image_picker: ^1.1.2
  firebase_storage: ^12.4.0
  flutter_custom_selector: ^0.0.3
  firebase_app_check: ^0.3.2+3
  collection: ^1.18.0
  shared_preferences: ^2.5.3
  google_sign_in: ^6.2.2
  email_otp: ^3.0.2
  mailer: ^6.6.0
  card_swiper: ^3.0.1
  uuid: ^4.5.1
  intl_phone_field: ^3.2.0
  http: ^1.4.0
  flutter_phone_direct_caller: ^2.2.1
  firebase_messaging: ^15.2.9
  flutter_native_splash: ^2.4.4
  shimmer: ^3.0.0
  redacted: ^1.0.13  
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  google_maps_flutter: ^2.10.1
  google_places_flutter: ^2.1.0
  connectivity_plus: ^6.1.4
  get: ^4.7.2
  loading_animation_widget: ^1.3.0
  googleapis_auth: ^1.6.0
  flutter_local_notifications: ^19.4.0
  flutter_lints: ^4.0.0
  timeago: ^3.7.1
  flutter_offline: ^5.0.0
  dash_no_internet_screen: ^0.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  image_cropper: ^11.0.0
  fluttertoast: ^8.2.14 
  vnpay_flutter: ^2.0.0
  app_links: ^6.4.1
  webview_flutter: ^4.13.0
  iconify_flutter: ^0.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  animated_text_kit: ^4.3.0
  google_generative_ai: ^0.4.7 
  material_symbols_icons: ^4.2928.1
  font_awesome_flutter: ^10.12.0
  android_intent_plus: ^6.0.0
  equatable: ^2.0.5
  url_launcher: ^6.3.2
  app_settings: ^5.1.1
  flutter_dotenv: ^6.0.1
  pinput: ^6.0.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  image_path: "assets/logo/logo.png"
  android: true
  ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo/logo.png"
  
flutter:
  assets:
    - .env
    - assets/img/
    - assets/fonts/
    - assets/logo/
  uses-material-design: true

  fonts:
    - family: Sniglet
      fonts:
        - asset: assets/fonts/Sniglet/Sniglet-ExtraBold.ttf
        - asset: assets/fonts/Sniglet/Sniglet-Regular.ttf
          weight: 400
    - family: PublicSans
      fonts:
        - asset: assets/fonts/PublicSans/PublicSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/PublicSans/PublicSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PublicSans/PublicSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PublicSans/PublicSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PublicSans/PublicSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PublicSans/PublicSans-Light.ttf
          weight: 300
        - asset: assets/fonts/PublicSans/PublicSans-ExtraLight.ttf
          weight: 200
flutter_native_splash:
  android: true
  ios: true
  web: false 

  background_image: "assets/logo/background.jpg" 
  image: "assets/logo/logo.png" 
  
  android_12:
    image: assets/logo/logo.png
    icon_background_color: "#ffffff"
